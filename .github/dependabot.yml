version: 2
updates:
  # npm dependencies — weekly check every Monday
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      # Batch all non-breaking minor/patch updates into one PR
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Only update major versions manually after review
      - dependency-name: next
        update-types: [version-update:semver-major]
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]

  # GitHub Actions — keep workflow actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Kolkata
