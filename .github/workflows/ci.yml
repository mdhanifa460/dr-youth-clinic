name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Explicit permissions — without this, actions/download-artifact@v8 (used by
# the e2e/visual-regression/lighthouse jobs to fetch the build job's output)
# 403s on repos whose default GITHUB_TOKEN permissions are read-only-content,
# since artifact listing/download needs the `actions` scope.
permissions:
  contents: read
  actions: read

env:
  NODE_VERSION: '20'

jobs:
  # ── 1. Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint:check

  # ── 2. TypeScript ────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run type-check

  # ── 3. Unit + Component + API Tests ─────────────────────────────────────────
  unit-tests:
    name: Unit & API Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Run unit tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── 4. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Build Next.js app
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextjs-build
          # Diagnostic (removed once this confirmed the real cause): .next/
          # was 479MB, 481MB of which was .next/cache (webpack's incremental
          # build cache — disposable, not needed to run the app, and not
          # regenerated by `next start`). That size is almost certainly what
          # silently defeated the upload ("No files were found with the
          # provided path: .next/" even though the directory very much
          # existed) — likely a storage-quota ceiling on a free-tier account.
          # Excluding cache/ drops the artifact to just the runtime output.
          # (First attempt at this used bare `.next/` + `!.next/cache`, which
          # matched zero files — @actions/glob's exclusion patterns need an
          # explicit `/**` to recurse the same way inclusion patterns do.)
          path: |
            .next/**
            !.next/cache/**
          retention-days: 1

  # ── 5. E2E Tests (Playwright) ────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      BASE_URL: http://localhost:3000
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build
          path: .next/
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start server and run E2E tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
          npm run test:e2e
      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload test screenshots
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7

  # ── 6. Visual Regression ─────────────────────────────────────────────────────
  visual-regression:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: build
    env:
      BASE_URL: http://localhost:3000
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build
          path: .next/
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start server and run visual tests
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
          npm run test:visual
      - name: Upload visual diff snapshots
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: visual-snapshots
          path: |
            tests/e2e/snapshots/
            test-results/
          retention-days: 14

  # ── 7. Lighthouse CI ─────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm install -g @lhci/cli
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: nextjs-build
          path: .next/
      - name: Start server and run Lighthouse
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 60000
          npm run test:lighthouse
      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 14

  # ── 8. Security Scan ─────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Check for hardcoded secrets
        run: |
          # Fail if any .env files with real values are committed
          if git ls-files | grep -E '\.env$|\.env\.local$|\.env\.production$'; then
            echo "ERROR: Real .env files should not be committed"
            exit 1
          fi
          echo "No committed .env files found"

  # ── 9. Deploy to Vercel ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm install -g vercel
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
